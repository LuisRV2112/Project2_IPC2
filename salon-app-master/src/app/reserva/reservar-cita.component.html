<div class="max-w-xl mx-auto p-4">
    <h2 class="text-2xl font-bold mb-4">Reservar cita</h2>
  
    <form [formGroup]="reservaForm" (ngSubmit)="reservar()">
      <label class="block mb-2 font-semibold">Selecciona un trabajador:</label>
      <select formControlName="trabajadorId" class="w-full mb-4 p-2 border"
              (change)="cargarHorarios(reservaForm.value.trabajadorId)">
        <option value="" disabled selected>-- Elegir trabajador --</option>
        <option *ngFor="let t of trabajadores" [value]="t.id">{{ t.nombre }}</option>
      </select>
  
      <label class="block mb-2 font-semibold" *ngIf="horarios.length">Selecciona un horario:</label>
      <select *ngIf="horarios.length" formControlName="horario" class="w-full mb-4 p-2 border">
        <option value="" disabled selected>-- Elegir horario --</option>
        <option *ngFor="let h of horarios" [value]="h">{{ h }}</option>
      </select>
  
      <button class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600" type="submit" [disabled]="reservaForm.invalid">
        Confirmar reserva
      </button>
    </form>
  </div>
